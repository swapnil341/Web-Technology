<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h4>
        </div>
        <div class="card-body">
          
          <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label">Product Name</label>
              <input type="text" formControlName="name" class="form-control" placeholder="e.g., Wireless Mouse">
            </div>

            <div class="mb-3">
              <label class="form-label">Category</label>
              <select formControlName="category" class="form-select">
                <option value="">Select Category</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Stationery">Stationery</option>
              </select>
            </div>

            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Price ($)</label>
                <input type="number" formControlName="price" class="form-control" step="0.01">
              </div>
              <div class="col">
                <label class="form-label">Quantity</label>
                <input type="number" formControlName="quantity" class="form-control">
              </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <a routerLink="/" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-success" [disabled]="productForm.invalid">
                {{ isEditMode ? 'Update' : 'Save' }} Product
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
