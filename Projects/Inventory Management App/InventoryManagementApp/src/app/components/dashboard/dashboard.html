<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Inventory Dashboard</h2>
    <a routerLink="/add" class="btn btn-primary">+ Add Product</a>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price ($)</th>
        <th>Quantity</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products; track product.id) {
        <tr [ngClass]="{'table-warning': product.quantity < 5}">
          <td>{{ product.name }}</td>
          <td>{{ product.category }}</td>
          <td>{{ product.price }}</td>
          <td>
            {{ product.quantity }} 
            <span *ngIf="product.quantity < 5" class="badge bg-danger ms-2">Low Stock</span>
          </td>
          <td>
            <a [routerLink]="['/edit', product.id]" class="btn btn-sm btn-outline-secondary me-2">Edit</a>
            <button (click)="deleteProduct(product.id)" class="btn btn-sm btn-outline-danger">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="text-center">No products found in inventory.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
