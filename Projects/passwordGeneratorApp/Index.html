<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>🔐 Password Generator</h2>

        <div class="output-box">
            <input type="text" id="password" placeholder="Generate password..." readonly>
            <button onclick="copyPassword()">Copy</button>
        </div>

        <div class="options">
            <div class="row">
                <label>Password Length</label>
                <input type="number" id="length" min="4" max="20" value="10">
            </div>

            <div class="row">
                <label><input type="checkbox" id="uppercase"> Uppercase</label>
            </div>

            <div class="row">
                <label><input type="checkbox" id="numbers"> Numbers</label>
            </div>

            <div class="row">
                <label><input type="checkbox" id="symbols"> Symbols</label>
            </div>
        </div>

        <button class="generate-btn" onclick="generatePassword()">
            Generate Password
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
