<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Slideshow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>🖼️ Image Slideshow</h2>

        <div class="image-box">
            <img id="slide" src="https://picsum.photos/id/1015/600/400" alt="slide">
        </div>

        <div class="controls">
            <button onclick="prevSlide()">⬅ Prev</button>
            <button onclick="nextSlide()">Next ➡</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
